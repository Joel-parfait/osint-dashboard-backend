# MongoDB connection - Spring Boot 4.x uses spring.mongodb prefix
spring.mongodb.uri=mongodb://kenji:Rolosha%40123@127.0.0.1:27017/leaks_db?authSource=admin

# Application name
spring.application.name=osint-dashboard

# Exclude JDBC/JPA/Hibernate auto-configuration (we only use MongoDB + Redis)
spring.autoconfigure.exclude=\
  org.springframework.boot.autoconfigure.jdbc.DataSourceAutoConfiguration,\
  org.springframework.boot.autoconfigure.orm.jpa.HibernateJpaAutoConfiguration,\
  org.springframework.boot.autoconfigure.jdbc.DataSourceTransactionManagerAutoConfiguration

# Logging for debugging MongoDB operations
logging.level.org.springframework.data.mongodb.core.MongoTemplate=DEBUG
logging.level.org.mongodb.driver=DEBUG

# Optional: Server port (default is 8080, change if needed)
server.port=8080

# Optional: Enable CORS globally
spring.web.cors.allowed-origins=http://localhost:3000
spring.web.cors.allowed-methods=GET,POST,PUT,DELETE,OPTIONS
spring.web.cors.allowed-headers=*

# Optional: Jackson serialization (pretty print JSON in responses)
spring.jackson.serialization.indent-output=true

# ====================================
# REDIS CACHE CONFIGURATION
# ====================================
spring.data.redis.host=localhost
spring.data.redis.port=6379
spring.data.redis.timeout=60000

# Cache settings
spring.cache.type=redis
spring.cache.redis.time-to-live=900000
# 900000ms = 15 minutes cache expiration

# Redis cache key prefix
spring.cache.redis.key-prefix=osint:

# Enable cache statistics
spring.cache.redis.enable-statistics=true

# Logging for Redis
logging.level.org.springframework.data.redis=DEBUG
logging.level.org.springframework.cache=DEBUG