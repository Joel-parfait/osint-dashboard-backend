# ====================================
# CONFIGURATION GÉNÉRALE
# ====================================
spring.application.name=osint-dashboard
server.port=${PORT:8080}
spring.main.allow-bean-definition-overriding=true

# Jackson serialization (pretty print JSON)
spring.jackson.serialization.indent-output=true

# ====================================
# MONGODB CONFIGURATION
# ====================================
spring.data.mongodb.uri=${SPRING_DATA_MONGODB_URI:mongodb+srv://joel_antic:AbWNwVofx2d3B6nx@cluster0.jecd7vk.mongodb.net/osint_db}
spring.data.mongodb.database=osint_db

# ====================================
# ELASTICSEARCH CLOUD CONFIGURATION (NOUVEAU CLUSTER)
# ====================================
# On utilise l'endpoint HTTPS
spring.elasticsearch.uris=${SPRING_ELASTICSEARCH_URIS:https://3043311edbe1478fbda323537cddfdf6.us-central1.gcp.cloud.es.io:443}
spring.elasticsearch.username=${SPRING_ELASTICSEARCH_USERNAME:elastic}
spring.elasticsearch.password=${SPRING_ELASTICSEARCH_PASSWORD:ZFLkqAma7ETziMJhS4jpjZoy}

# Logging pour le moteur de recherche
logging.level.org.springframework.data.elasticsearch.client.wire=TRACE

# ====================================
# SÉCURITÉ JWT (INDISPENSABLE MOBILE)
# ====================================
jwt.secret=${JWT_SECRET:MaCleSecreteSuperLonguePourLeCIRT2026}

# ====================================
# REDIS CACHE CONFIGURATION
# ====================================
spring.data.redis.host=${REDIS_HOST:localhost}
spring.data.redis.port=${REDIS_PORT:6379}
spring.data.redis.timeout=60000
spring.cache.type=none
spring.cache.redis.time-to-live=900000
spring.cache.redis.key-prefix=osint:

# ====================================
# EXCLUSIONS & LOGGING
# ====================================
spring.autoconfigure.exclude=\
  org.springframework.boot.autoconfigure.jdbc.DataSourceAutoConfiguration,\
  org.springframework.boot.autoconfigure.orm.jpa.HibernateJpaAutoConfiguration,\
  org.springframework.boot.autoconfigure.jdbc.DataSourceTransactionManagerAutoConfiguration

logging.level.org.springframework.data.mongodb.core.MongoTemplate=DEBUG
logging.level.org.mongodb.driver=DEBUG

# CORS pour le dashboard web et les tests
spring.web.cors.allowed-origins=*
spring.web.cors.allowed-methods=GET,POST,PUT,DELETE,OPTIONS
spring.web.cors.allowed-headers=*
